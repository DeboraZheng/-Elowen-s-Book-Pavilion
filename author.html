<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>作者介绍 | 书雪书阁</title>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: "Noto Serif SC", serif;
            background: url('https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&w=1350&q=80') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
        }

        .overlay {
            background: rgba(0,0,0,0.55);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255,255,255,0.15);
            border-radius: 15px;
            padding: 30px;
            backdrop-filter: blur(8px);
        }

        h1 {
            font-family: "Playfair Display", serif;
            font-size: 42px;
            text-align: center;
            margin-top: 0;
        }

        p {
            font-size: 18px;
            line-height: 1.8;
        }

        a {
            color: #cce0ff;
            font-weight: bold;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .back {
            margin-top: 30px;
            text-align: center;
        }
    </style>
</head>

<body>
<div class="overlay">
    <div class="container">

        <div class="card">
            <h1>作者介绍</h1>

            <p>这里可以写你的作者简介，例如你的创作理念、你的世界观、你为什么写《梦雪》。</p>
            <p>你可以介绍你的写作风格、你喜欢的题材、你对“书雪书阁”这个世界的构想。</p>
            <p>也可以写一些你想对读者说的话，让他们更了解你的创作旅程。</p>

            <div class="back">
                <a href="index.html">← 返回首页</a>
            </div>
        </div>

    </div>
</div>

</html>
